name: Release Containers
run-name: "📦 Release containers (version annotation change)"

on:
  push:
    branches: [main]
    paths:
      - 'containers/jenkins-inbound-agent/Dockerfile'
      - 'containers/logstash-with-opensearch-plugin/Dockerfile'
  workflow_dispatch:
    inputs:
      container:
        description: "Container to release"
        required: true
        type: choice
        options:
          - jenkins-inbound-agent
          - logstash-with-opensearch-plugin

jobs:
  # ---------------------------------------------------------------------------
  # Detect: extract version from Dockerfile label, check GHCR for duplicates
  # ---------------------------------------------------------------------------
  detect:
    runs-on: ubuntu-24.04
    permissions:
      packages: read
    outputs:
      jenkins_inbound_agent_release: ${{ steps.check.outputs.jenkins_inbound_agent_release }}
      jenkins_inbound_agent_version: ${{ steps.check.outputs.jenkins_inbound_agent_version }}
      logstash_with_opensearch_plugin_release: ${{ steps.check.outputs.logstash_with_opensearch_plugin_release }}
      logstash_with_opensearch_plugin_version: ${{ steps.check.outputs.logstash_with_opensearch_plugin_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract versions and check GHCR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SELECTED: ${{ inputs.container }}
        run: |
          extract_version() {
            grep -oP 'org\.opencontainers\.image\.version="\K[^"]+' "$1" || echo ""
          }

          check_ghcr() {
            local image="$1" version="$2"
            local token
            token=$(echo -n "${GH_TOKEN}" | base64)
            local tags
            tags=$(curl -sf -H "Authorization: Bearer ${token}" \
              "https://ghcr.io/v2/${image}/tags/list" 2>/dev/null || echo '{"tags":[]}')
            if echo "${tags}" | jq -e --arg v "${version}" '.tags // [] | index($v)' > /dev/null 2>&1; then
              echo "exists"
            else
              echo "new"
            fi
          }

          CONTAINERS=("jenkins-inbound-agent" "logstash-with-opensearch-plugin")

          for container in "${CONTAINERS[@]}"; do
            var=$(echo "${container}" | tr '-' '_')
            dockerfile="containers/${container}/Dockerfile"

            ## Skip non-selected containers on manual dispatch
            if [[ -n "${SELECTED}" && "${SELECTED}" != "${container}" ]]; then
              echo "${var}_release=false" >> "$GITHUB_OUTPUT"
              echo "${var}_version=" >> "$GITHUB_OUTPUT"
              continue
            fi

            if [[ ! -f "${dockerfile}" ]]; then
              echo "::warning::${dockerfile} not found, skipping"
              echo "${var}_release=false" >> "$GITHUB_OUTPUT"
              echo "${var}_version=" >> "$GITHUB_OUTPUT"
              continue
            fi

            version=$(extract_version "${dockerfile}")
            if [[ -z "${version}" ]]; then
              echo "::error::org.opencontainers.image.version not found in ${dockerfile}"
              echo "${var}_release=false" >> "$GITHUB_OUTPUT"
              echo "${var}_version=" >> "$GITHUB_OUTPUT"
              continue
            fi

            status=$(check_ghcr "opencomputinggarage/${container}" "${version}")
            if [[ "${status}" == "exists" ]]; then
              echo "✅ ${container}:${version} already exists on GHCR — skip"
              echo "${var}_release=false" >> "$GITHUB_OUTPUT"
            else
              echo "🆕 ${container}:${version} not found on GHCR — will release"
              echo "${var}_release=true" >> "$GITHUB_OUTPUT"
            fi
            echo "${var}_version=${version}" >> "$GITHUB_OUTPUT"
          done

  # ---------------------------------------------------------------------------
  # Release: build and push (matrix)
  # ---------------------------------------------------------------------------
  release:
    needs: detect
    if: always() && !cancelled()
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: jenkins-inbound-agent
            release_flag: jenkins_inbound_agent_release
            version_key: jenkins_inbound_agent_version
            context: containers/jenkins-inbound-agent
            platforms: linux/amd64,linux/arm64
            push_latest: false
          - name: logstash-with-opensearch-plugin
            release_flag: logstash_with_opensearch_plugin_release
            version_key: logstash_with_opensearch_plugin_version
            context: containers/logstash-with-opensearch-plugin
            platforms: linux/amd64
            push_latest: false
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: opencomputinggarage/${{ matrix.name }}
    steps:
      - name: Check release eligibility
        id: check
        env:
          RELEASE_FLAG: ${{ needs.detect.outputs[matrix.release_flag] }}
          VERSION: ${{ needs.detect.outputs[matrix.version_key] }}
        run: |
          SHOULD_RELEASE="false"
          if [[ "${RELEASE_FLAG}" == "true" ]]; then
            SHOULD_RELEASE="true"
          fi
          echo "should_release=${SHOULD_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.check.outputs.should_release == 'true'
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: steps.check.outputs.should_release == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.check.outputs.should_release == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        if: steps.check.outputs.should_release == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.check.outputs.should_release == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.check.outputs.version }}
            ${{ matrix.push_latest == true && 'type=raw,value=latest' || '' }}

      - name: Build and push Docker image
        if: steps.check.outputs.should_release == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
